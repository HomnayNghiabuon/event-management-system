spring:
  application:
    name: event-management-server

  datasource:
    url: ${DB_URL:jdbc:h2:mem:eventdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;NON_KEYWORDS=VALUE}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  sql:
    init:
      mode: always       # Luôn chạy data.sql khi khởi động
      encoding: UTF-8

  jpa:
    database-platform: ${JPA_PLATFORM:org.hibernate.dialect.H2Dialect}
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:create-drop}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true   # Chạy data.sql SAU KHI Hibernate tạo bảng xong
    open-in-view: false

  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

server:
  port: ${SERVER_PORT:8081}

app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration: ${JWT_EXPIRATION:3600000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
  payment:
    return-base-url: ${APP_RETURN_BASE_URL:http://localhost:5173}
    ipn-base-url: ${APP_IPN_BASE_URL:http://localhost:8081}
    vnpay:
      tmn-code: ${VNPAY_TMN_CODE:}
      hash-secret: ${VNPAY_HASH_SECRET:}
      pay-url: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      api-url: ${VNPAY_API_URL:https://sandbox.vnpayment.vn/merchant_webapi/api/transaction}
      version: "2.1.0"
      command: "pay"
      currency: "VND"
      locale: "vn"
    momo:
      partner-code: ${MOMO_PARTNER_CODE:MOMO}
      access-key: ${MOMO_ACCESS_KEY:}
      secret-key: ${MOMO_SECRET_KEY:}
      endpoint: ${MOMO_ENDPOINT:https://test-payment.momo.vn/v2/gateway/api/create}
      request-type: ${MOMO_REQUEST_TYPE:payWithMethod}
